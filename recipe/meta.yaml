{% set version = "0.2.0" %}

package:
  name: scope-bio
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/scope-bio/scope_bio-{{ version }}.tar.gz
  sha256: 2682819fc52eaabf08e1fb9ad9a1b92d5eef2bc91454816481a18f5aa538d646

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=68
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.24
    - scipy >=1.10
    - pandas >=1.5
    - scikit-learn >=1.3
    - anndata >=0.9
    - scanpy >=1.9
    - matplotlib-base >=3.6
    - seaborn >=0.12
    - joblib >=1.2

test:
  imports:
    - scope
    - scope.io
    - scope.visualization
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Ashford-A/scOPE
  dev_url: https://github.com/Ashford-A/scOPE
  doc_url: https://github.com/Ashford-A/scOPE#readme
  summary: 'scOPE: single-cell Oncological Prediction Explorer — transfer-learning from bulk RNA-seq to predict per-cell mutation probabilities in scRNA-seq.'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Ashford-A
